<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Detail</title>
  <style>
    body {
      background-color: orange;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: red;
      text-align: center;
    }
    .form-section {
      margin: 20px auto;
      width: 80%;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
    }
    label {
      display: inline-block;
      width: 150px;
      font-weight: bold;
    }
    input, select {
      margin-bottom: 10px;
      padding: 5px;
      width: 200px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    table, th, td {
      border: 1px solid #333;
    }
    th, td {
      padding: 8px;
      text-align: center;
    }
    .buttons {
      margin-top: 20px;
      text-align: center;
    }
    .btn {
      padding: 10px 20px;
      margin: 0 10px;
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-add { background-color: green; }
    .btn-save { background-color: blue; }
    .btn-exit { background-color: red; }
    .total {
      text-align: right;
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Order's Detail</h1>
  <div class="form-section">
    <div>
      <label>Import Date:</label>
      <input type="date" value="2026-02-03">
    </div>
    <div>
      <label>Order's ID:</label>
      <input type="text">
    </div>
    <div>
      <label>Staff's Name:</label>
      <select>
        <option>Staff ID 1</option>
        <option>Staff ID 2</option>
      </select>
    </div>
    <div>
      <label>Customer's Name:</label>
      <select>
        <option>Customer ID 1</option>
        <option>Customer ID 2</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>Product's Code</th>
          <th>Product's Name</th>
          <th>Import Quantity</th>
          <th>Unit Price</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="text"></td>
          <td><input type="text"></td>
          <td><input type="number"></td>
          <td><input type="number" step="0.01"></td>
          <td><input type="number" step="0.01"></td>
        </tr>
      </tbody>
    </table>

    <div class="buttons">
      <button class="btn btn-add">Add</button>
      <button class="btn btn-save">Save</button>
      <button class="btn btn-exit">Exit</button>
    </div>

    <div class="total">
      Total: $0.00
    </div>
  </div>
</body>
</html>
