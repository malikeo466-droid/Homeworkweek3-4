<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Practice Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>Student Practice Webpage</h1>
            <p>HTML + CSS Practice {Forms + Table Advanced}</p>
        </div>
    </div>
    <div class="Box">
        <h3>Image Section</h3>
        <img src="https://img.magnific.com/free-photo/photorealistic-view-tree-nature-with-branches-trunk_23-2151478106.jpg?semt=ais_hybrid&w=740&q=80" alt="nature">
    </div>
    <div class="Table">
        <h3>Advanced Table</h3>
        <table border="1" cellspacing="0" cellpadding="10">
            <tr>
                <th rowspan="2">Name</th>
                <th colspan="2">Scores</th>
                <th rowspan="2">Grade</th>
            </tr>
            <tr>
                <th>Math</th>
                <th>SC</th>
            </tr>       
            <tr>
                <td>Nita</td>
                <td>89</td>
                <td>90</td>
                <td>A</td>
            </tr>
            <tr>    
                <td>Ly</td>
                <td>78</td>
                <td>86</td>
                <td>B</td>
                </tr>
        </table>
        
    </div>
    <div class="box">
        <div class="form-container">
            
            <h3>Form 1: Basic Info</h3>
            <form> <label>Name *</label> <input type="text" required> <label>Email *</label> <input type="email" required>
                <label>Password *</label> <input type="password" required> <label>Upload File</label> <input type="file">
                <button type="submit">Submit</button> <button type="reset">Reset</button> </form>
        </div>
    </div> 
    <div class="box">
        <div class="form-container">
           
            <h3>Form 2: Survey Form</h3>
            <form> <label>Choose Course *</label> <select required>
                    <option value="">-- Select --</option>
                    <option>HTML</option>
                    <option>CSS</option>
                    <option>JavaScript</option>
                </select> <label>Gender</label>
                <div class="radio-group"> <input type="radio" name="gender"> Male <input type="radio" name="gender"> Female
                </div> <label>Skills</label>
                <div class="checkbox-group"> <input type="checkbox"> HTML <input type="checkbox"> CSS <input
                        type="checkbox"> JS </div> <label>Phone *</label> <input type="tel" required> <label>Message</label>
                <textarea></textarea> <button type="submit">Send</button>
            </form>
        </div>
    </div>
    </div>
</body>
</html>
