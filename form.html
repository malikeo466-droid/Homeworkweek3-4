<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML FORM</title>
</head>
    <link rel="icon" href="image/htmllogo.png">
<body>
    <div>
        <h1>HTML FORM</h1>
        <h2>Sign In Form</h2>
        <form>
            Email:<input placeholder="Enter your email" type="email">
            <br><br>
            Password:<input placeholder="Enter your password" type="password" id="password" name="password">
            <br><br>
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label>
            <br><br>
            <input type="submit" value="Sign In">
        </form>
        </div>
        <hr>
    <div>
        <form>
            <h2>Sign Up Form</h2>
            Full Name:<input placeholder="Enter your full name" type="text">
            <br><br>
            Email:<input placeholder="Enter your email" type="email">
            <br><br>
            Password:<input placeholder="Enter your password" type="password">
            <br><br>
            Confirm Password:<input placeholder="Confirm your password" type="password">
            <br><br>
            Phone Number:<input placeholder="Enter your phone number" type="tel">
            <br><br>
            Gender:
            <input type="radio" id="Male" name="gender" value="Male">
            <label for="Male        ">Male</label>
            <input type="radio" id="Female" name="gender" value="Female">
            <label for="Female">Female</label>
            <input type="radio" id="Other" name="gender" value="Other">
            <label for="Other">Other</label>
            <br><br>
            <input type="submit" value="Sign Up">
        </form>
    </div>

    <hr>
    <div>
        <h2>Contact Form</h2>
        <form>
         Name: <input placeholder="Enter your name" type="text">
            <br><br>
            Email: <input placeholder="Enter your email" type="email">
            <br><br>
            Message: <textarea placeholder="Enter your message"></textarea>
            <br><br>
            <input type="submit" value="Send">
            <input type="reset" value="Reset">
        </form>
    </div>
</body>
</html>
